syntax = "proto3";

option csharp_namespace = "LibplanetConsole.Grpc.Delegation";

package libplanet.console.delegation.v1;

service DelegationGrpcService {
  rpc Stake(StakeRequest) returns (StakeResponse);
  rpc Unstake(UnstakeRequest) returns (UnstakeResponse);
  rpc ModifyStake(ModifyStakeRequest) returns (ModifyStakeResponse);
  rpc Promote(PromoteRequest) returns (PromoteResponse);
}

message StakeRequest {
  int64 amount = 1;
}

message StakeResponse {
}

message UnstakeRequest {
  int64 amount = 1;
}

message UnstakeResponse {
}

message ModifyStakeRequest {
  int64 amount = 1;
}

message ModifyStakeResponse {
}

message PromoteRequest {
  int64 amount = 1;
}

message PromoteResponse {
}
